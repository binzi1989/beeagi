version: "3.9"

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: beeagi-postgres
    environment:
      POSTGRES_USER: bee
      POSTGRES_PASSWORD: bee
      POSTGRES_DB: beeagi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: beeagi-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: beeagi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ./backend
    container_name: beeagi-backend
    environment:
      APP_DATABASE_URL: postgresql+psycopg://bee:bee@postgres:5432/beeagi
      APP_REDIS_URL: redis://redis:6379/0
      APP_CELERY_BROKER_URL: redis://redis:6379/1
      APP_CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: ./backend
    container_name: beeagi-worker
    command: celery -A worker.celery_app.celery_app worker --loglevel=INFO
    environment:
      APP_DATABASE_URL: postgresql+psycopg://bee:bee@postgres:5432/beeagi
      APP_REDIS_URL: redis://redis:6379/0
      APP_CELERY_BROKER_URL: redis://redis:6379/1
      APP_CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - backend

volumes:
  pgdata:
  minio-data:
